resources:
  packages:
  - name: python-dotenv
    version_pin: latest
  - name: tenacity
    version_pin: latest
  - name: sqlalchemy
    version_pin: latest
  - name: schedule
    version_pin: latest
  - name: exchange-calendars
    version_pin: latest
  - name: pandas
    version_pin: latest
  - name: numpy
    version_pin: latest
  - name: requests
    version_pin: latest
  - name: PyYAML
    version_pin: latest
  - name: efinance
    version_pin: latest
  strategy_scaffold:
    entry_point_name: run_backtest
    output_path: result.csv
    execution_mode: backtest
    conditional_entry_points:
      backtest:
        entry_point_name: run_backtest
        output_path: result.csv
      collector:
        entry_point_name: run_collector
        output_path: result.json
      factor:
        entry_point_name: run_factor
        output_path: result.parquet
      training:
        entry_point_name: run_training
        output_path: result.json
      serving:
        entry_point_name: run_server
        output_path: result.json
      research:
        entry_point_name: run_research
        output_path: result.json
    tail_template: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()  #\
      \ implement above\n    from validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\"\
      )\n# === END DO NOT MODIFY ==="
  host_adapter:
    target: openclaw
    timeout_seconds: 1800
    shell_operator_restriction: 'exec tool intercepts && / ; / | — never chain: ''pip install X && python Y''. Use separate
      exec calls.'
    install_recipes:
    - python3 -m pip install python-dotenv
    - python3 -m pip install tenacity
    - python3 -m pip install sqlalchemy
    - python3 -m pip install zvt
    credential_injection: JoinQuant/QMT credentials require user-side '!' prefix shell login. Never hardcode credentials in
      generated scripts.
    path_resolution: '{workspace} resolves to ~/.openclaw/workspace/doramagic at execution time.'
    file_io_tooling: Use openclaw 'write' tool for .py/.sql files; 'exec' tool for python3 /absolute/path/script.py (absolute
      paths only).
constraints:
  fatal:
  - id: finance-C-001
    when: When implementing a BaseFetcher subclass for data collection
    action: normalize stock codes to exactly 6-digit format for A-share, 5-digit with HK prefix for HK, and uppercase alphanumeric
      for US stocks
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect stock code format causes routing failures and data fetcher returns empty DataFrame, breaking analysis
      pipeline for that stock
    stage_ids:
    - data_collection
  - id: finance-C-002
    when: When calculating volume_ratio technical indicator
    action: use shift(1) on the 5-day rolling average volume denominator to exclude current day from the calculation
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without shift(1), the volume_ratio includes current day volume in both numerator and denominator, creating
      look-ahead contamination that inflates the ratio
    stage_ids:
    - data_collection
  - id: finance-C-003
    when: When returning fetched data from any fetcher implementation
    action: 'include exactly these columns in the output DataFrame: date, open, high, low, close, volume, amount, pct_chg,
      ma5, ma10, ma20, volume_ratio'
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Missing required columns cause downstream analysis stages to fail with KeyError, breaking the entire trading
      signal generation pipeline
    stage_ids:
    - data_collection
  - id: finance-C-004
    when: When a single data provider fails during data collection
    action: return an empty DataFrame for that provider and allow the DataFetcherManager to failover to the next provider
      in the priority chain
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Raising unhandled exceptions from a single provider causes complete data collection failure instead of graceful
      failover, resulting in no stock data for the analysis
    stage_ids:
    - data_collection
  - id: finance-C-005
    when: When implementing the BaseFetcher abstract interface
    action: implement the _fetch_raw_data and _normalize_data abstract methods to fulfill the Strategy pattern contract for
      multi-source failover
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Missing implementation of required abstract methods causes TypeError at runtime, preventing the fetcher from
      being instantiated and used in the data collection pipeline
    stage_ids:
    - data_collection
  - id: finance-C-013
    when: When calculating bias values for trend analysis
    action: use percentage deviation formula (price - MA) / MA * 100% with division-by-zero guard (MA > 0)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Division by zero causes analysis crash when MA equals zero, resulting in service disruption for stocks with
      insufficient price history
    stage_ids:
    - technical_analysis
  - id: finance-C-014
    when: When computing RSI indicators with insufficient price history
    action: fill NaN RSI values with neutral fallback value 50
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NaN RSI propagates to signal generation, causing signal_score to become NaN and producing invalid trading
      recommendations
    stage_ids:
    - technical_analysis
  - id: finance-C-015
    when: When generating trading signals with bias_ma5 set to NaN
    action: treat NaN bias as 0.0 to prevent signal_score corruption
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: NaN bias in signal scoring causes result.signal_score to become NaN, producing unparseable recommendations
    stage_ids:
    - technical_analysis
  - id: finance-C-017
    when: When performing technical analysis on a stock
    action: require at least 20 rows of OHLCV data for StockTrendAnalyzer.analyze() to proceed
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Insufficient data causes incomplete MA calculations (MA5=NaN, MA10=NaN, MA20=NaN), leading to incorrect trend
      signals and potential financial losses from bad trades
    stage_ids:
    - technical_analysis
  - id: finance-C-031
    when: When building agent chain in multi-agent pipeline
    action: 'respect execution order: Technical before Intel before Risk before Decision'
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Skipping or reordering agent stages breaks data dependency chain and produces incomplete or incorrect analysis
      results. Technical agent fetches data that Intel and Decision agents rely on.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-032
    when: When implementing decision dashboard generation
    action: normalize decision_type to buy|hold|sell enum
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Non-normalized signals (strong_buy, strong_sell) cause downstream processing errors and violate the canonical
      dashboard schema, breaking downstream consumers like notification rendering.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-039
    when: When presenting agent analysis results
    action: present backtest or simulated results as verified live trading returns
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: Presenting simulated backtest performance as actual returns violates financial compliance norms and misleads
      users about expected live trading outcomes. Backtests use historical data with no slippage/fees modeling.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-046
    when: When loading skill YAML files, the code MUST use yaml.safe_load instead of yaml.load
    action: use yaml.safe_load for each YAML deserialization in skill loading functions
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Malicious YAML files could execute arbitrary code (e.g., Python object injection via !!python/object) if
      unsafe yaml.load is used, leading to remote code execution on the server
    stage_ids:
    - skill_system
  - id: finance-C-048
    when: When loading a Skill from YAML, the required fields (name, display_name, description, instructions) MUST be present
      and non-empty
    action: check that required_fields exist and are truthy before constructing Skill
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: A malformed skill YAML missing required fields would create a Skill with empty strings, causing downstream
      agents to receive blank instructions and produce meaningless analysis
    stage_ids:
    - skill_system
  - id: finance-C-053
    when: When building the SkillManager prototype in the factory, the import and loading MUST be lazy to avoid filesystem
      errors at module import time
    action: defer SkillManager import and YAML file loading to first call of get_skill_manager()
    severity: fatal
    kind: resource_boundary
    modality: must
    consequence: Importing the module when strategies/ directory is missing or inaccessible would crash the entire application
      on startup, preventing the bot from serving any requests
    stage_ids:
    - skill_system
  - id: finance-C-076
    when: When implementing FIFO lot consumption for partial sells
    action: consume lots in chronological order (oldest first)
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Incorrect FIFO ordering causes wrong cost basis calculation, resulting in inaccurate realized P&L that may
      lead to incorrect tax reporting and financial misrepresentation
    stage_ids:
    - portfolio_management
  - id: finance-C-077
    when: When processing same-day corporate actions and trades
    action: process corporate actions before trades on the same date
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Processing trades before corporate actions (e.g., split) causes incorrect position quantity, resulting in
      wrong cost basis and unreliable portfolio valuations
    stage_ids:
    - portfolio_management
  - id: finance-C-078
    when: When recording a sell trade
    action: validate requested quantity does not exceed available quantity before writing
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Overselling creates phantom positions, corrupts P&L calculations, and makes portfolio snapshot unreliable
      for risk management decisions
    stage_ids:
    - portfolio_management
  - id: finance-C-081
    when: When fetching FX rates for currency conversion
    action: crash when yfinance FX fetch fails
    severity: fatal
    kind: resource_boundary
    modality: must_not
    consequence: FX fetch failure causes portfolio snapshot to crash, blocking all position-aware analysis and risk reporting
    stage_ids:
    - portfolio_management
  - id: finance-C-085
    when: When handling concurrent sell trades for the same position
    action: serialize writes using SQLite transactions to prevent double-selling
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Race condition allows multiple concurrent sells to pass quantity validation, creating negative positions
      and corrupting P&L
    stage_ids:
    - portfolio_management
  - id: finance-C-089
    when: When handling duplicate trade records during CSV import
    action: deduplicate based on trade_uid or computed dedup_hash to prevent double-counting
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Duplicate trades inflate position quantities, corrupting cost basis and P&L calculations, potentially triggering
      incorrect stop-losses
    stage_ids:
    - portfolio_management
  - id: finance-C-102
    when: When calling evaluate_single with an eval_window_days configuration
    action: Verify eval_window_days is a positive integer greater than zero
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: If eval_window_days is zero or negative, the backtest engine raises ValueError('eval_window_days must be
      positive') which propagates as an unhandled exception, causing the entire backtest run to abort.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-114
    when: When computing a global summary rollup over each stocks
    action: Use OVERALL_SENTINEL_CODE='__overall__' as the code value for overall scope summaries
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: The overall summary uses OVERALL_SENTINEL_CODE='__overall__' as a sentinel code value (backtest_engine.py:15).
      Failing to use this sentinel would prevent the global rollup from being stored and retrieved correctly, breaking get_global_summary
      and all cross-stock performance reporting.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-120
    when: When using backtest results to guide or justify live trading decisions
    action: Present backtest results as historical accuracy metrics only, not as live trading performance guarantees
    severity: fatal
    kind: claim_boundary
    modality: must_not
    consequence: The BacktestEngine evaluates historical analyst decisions against forward price bars. This is a purely historical
      evaluation. Presenting backtest win rates, simulated returns, or directional accuracy as expected live trading performance
      would mislead users into believing the system has predictive capability it does not possess.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-123
    when: When writing or modifying the BacktestEngine class
    action: Import database access libraries or storage-layer components into the backtest engine
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Adding SQLAlchemy imports, DatabaseManager references, or file I/O to backtest_engine.py would violate the
      DB-agnostic design contract, breaking the separation of concerns between pure evaluation logic and data access. This
      would prevent the engine from being reused in environments without the full storage layer.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-129
    when: When normalizing ReportType from API or config input
    action: Map string value 'detailed' to ReportType.FULL via ReportType.from_str() method
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Reports requested as 'detailed' type will be rendered as 'simple' instead of full dashboard format, causing
      users to receive incomplete analysis without key decision metrics
    stage_ids:
    - notification_dispatch
  - id: finance-C-130
    when: When routing email notifications to stock-specific recipients
    action: Normalize each stock codes using normalize_stock_code() before comparing against stock_email_groups mappings
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Email groups will fail to match equivalent stock codes with different format prefixes (e.g., SH600519 vs
      600519, 1810.HK vs HK01810), causing misrouted or default-recipient emails
    stage_ids:
    - notification_dispatch
  - id: finance-C-132
    when: When sending notifications through each configured channels
    action: Iterate through each detected available channels and send the formatted report content to each one independently
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Configured notification channels (Telegram, Email, WeChat, Feishu, etc.) will silently skip sending, leaving
      users without analysis results on their preferred platforms
    stage_ids:
    - notification_dispatch
  - id: finance-C-143
    when: When implementing StockDaily upsert logic
    action: use sqlite_insert with on_conflict_do_update using (code, date) unique index elements
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Duplicate records for same (code, date) violate business invariant that one stock has exactly one daily bar
      per calendar date, causing incorrect analysis results or inflated record counts
    stage_ids:
    - storage_persistence
  - id: finance-C-144
    when: When running SQLite file database in concurrent read/write scenario
    action: enable WAL journal_mode and configure busy_timeout before any read/write
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: WITHOUT WAL mode, SQLite uses rollback journal which blocks concurrent reads during writes; concurrent writes
      fail with 'database is locked' error, causing pipeline stalls or data loss
    stage_ids:
    - storage_persistence
  - id: finance-C-146
    when: When writing concurrent SQLite transactions via _run_write_transaction
    action: acquire write lock with BEGIN IMMEDIATE before any read inside write_operation
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Without BEGIN IMMEDIATE, existence checks and upsert execute in separate transactions, causing race condition
      where concurrent threads both see 'no existing record' and insert duplicates
    stage_ids:
    - storage_persistence
  - id: finance-C-147
    when: When implementing save_daily_data batch upsert for SQLite
    action: chunk records into batches of 50 or fewer to stay within SQLite's ~999 bind-parameter limit
    severity: fatal
    kind: architecture_guardrail
    modality: must
    consequence: Exceeding bind-parameter limit causes SQLAlchemy to raise OperationalError, preventing daily data from being
      saved and breaking the data collection pipeline
    stage_ids:
    - storage_persistence
  - id: finance-C-195
    when: When implementing write operations to the SQLite portfolio database
    action: Use ledger lock serialization for each write operations — acquire PortfolioBusyError-throwing lock before executing
      writes to prevent concurrent write corruption
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Without ledger lock serialization, concurrent writes can corrupt the SQLite database file, causing irreversible
      loss of position and transaction records; recovered data may show phantom positions or missing lots
    derived_from_bd_id: BD-GAP-009
  - id: finance-C-196
    when: When implementing position cache refresh logic in portfolio repository
    action: Refresh position cache and daily snapshot atomically in a single transaction — do not split into separate operations
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: 'Splitting the refresh into two-phase operations causes snapshot/position divergence on crash: snapshot shows
      old positions while cache shows new, making portfolio state inconsistent and causing incorrect P&L calculations'
    derived_from_bd_id: BD-GAP-010
  - id: finance-C-202
    when: When implementing SSRF protection for external URL validation in system_config_service.py
    action: Allow requests to link-local addresses (169.254.x.x) or cloud metadata endpoints — these must be blocked by SSRF
      protection filters regardless of configuration flexibility needs
    severity: fatal
    kind: domain_rule
    modality: must_not
    consequence: Allowing 169.254.x.x addresses exposes cloud metadata services (AWS IMDS, Azure Instance Metadata) to potential
      server-side request forgery attacks, enabling credential theft and infrastructure compromise
    derived_from_bd_id: BD-GAP-020
  - id: finance-C-223
    when: When implementing API error handling middleware
    action: Return HTTP 500 status code for unhandled exceptions without exposing internal details; detailed error information
      must only be logged server-side and not returned to clients
    severity: fatal
    kind: domain_rule
    modality: must
    consequence: Returning detailed error messages to clients exposes internal implementation details including database structure,
      file paths, and API keys, creating security vulnerabilities exploitable by attackers
    derived_from_bd_id: BD-032
  - id: finance-C-250
    when: When implementing changes without explicit user confirmation
    action: Execute git commit, git tag, or git push without explicit user confirmation
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Unauthorized git operations change the repository state without user approval, potentially breaking CI or
      releasing unintended changes
  - id: finance-C-256
    when: When skill operations might change remote or branch state
    action: Automatically execute git pull, git push, git tag, or gh pr create without explicit user confirmation in skill
      operations
    severity: fatal
    kind: rationalization_guard
    modality: must_not
    consequence: Unauthorized git operations change the repository state, potentially overwriting user work or creating unintended
      commits and branches
  regular:
  - id: finance-C-006
    when: When using AkShareFetcher as the primary data source
    action: enforce rate limiting with 2.0-5.0 seconds of jitter sleep between consecutive requests to avoid anti-scraping
      blocking
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Violation of resource_boundary constraint
    stage_ids:
    - data_collection
  - id: finance-C-007
    when: When fetching stock data from free public data sources
    action: claim real-time data delivery capability since each free sources (AkShare, yfinance, Sina) have inherent polling
      delays ranging from minutes to potentially hours
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting delayed data as real-time leads to poor trading decisions where entry/exit signals are based on
      stale price information, resulting in suboptimal execution
    stage_ids:
    - data_collection
  - id: finance-C-008
    when: When processing stock data through the DataFetcherManager
    action: normalize stock codes using normalize_stock_code() before passing to individual fetchers to verify consistent
      routing across each data sources
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inconsistent stock code formats cause routing to the wrong data source or incorrect API parameters, resulting
      in empty data returns or incorrect stock data
    stage_ids:
    - data_collection
  - id: finance-C-009
    when: When computing moving average indicators on stock price data
    action: calculate MA5, MA10, MA20 using pandas rolling window with min_periods=1 to handle insufficient data gracefully
      at the start of the time series
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Without min_periods parameter, early rows with insufficient history produce NaN values that propagate through
      downstream calculations and cause analysis failures
    stage_ids:
    - data_collection
  - id: finance-C-010
    when: When encountering rate limiting from any data source API
    action: trigger circuit breaker mechanism and failover to alternative data sources rather than retrying against the rate-limited
      source immediately
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Repeated retry attempts against a rate-limited source exhausts the circuit breaker, extends the blocking
      period, and delays data acquisition unnecessarily
    stage_ids:
    - data_collection
  - id: finance-C-011
    when: When returning data from any fetcher's _normalize_data method
    action: round technical indicator columns (ma5, ma10, ma20, volume_ratio) to 2 decimal places to verify consistent precision
      and avoid floating-point comparison issues
    severity: low
    kind: domain_rule
    modality: must
    consequence: Unrounded floating-point values cause inconsistent comparison results and unnecessary precision differences
      when validating or displaying technical indicators
    stage_ids:
    - data_collection
  - id: finance-C-012
    when: When cleaning fetched stock data before indicator calculation
    action: drop rows where close or volume is null and sort by date in ascending order to verify temporal consistency in
      rolling calculations
    severity: high
    kind: domain_rule
    modality: must
    consequence: Null values in critical columns cause NaN propagation through rolling calculations; out-of-order dates create
      incorrect moving averages that mix historical and future data points
    stage_ids:
    - data_collection
  - id: finance-C-016
    when: When computing RSI values with zero average loss
    action: 'guard against division by zero when avg_loss equals zero (RSI formula: 100 - 100/(1+RS))'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Division by zero in RSI calculation causes analysis to crash when stock has no down days in the lookback
      period
    stage_ids:
    - technical_analysis
  - id: finance-C-018
    when: When analyzing MACD indicators
    action: require at least MACD_SLOW (26) rows of data, otherwise return '数据不足' signal
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient data causes MACD to produce unreliable signals due to incomplete EMA calculations, leading to
      false trend confirmation
    stage_ids:
    - technical_analysis
  - id: finance-C-019
    when: When analyzing RSI indicators
    action: require at least RSI_LONG (24) rows of data, otherwise return '数据不足' signal
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Insufficient data causes RSI to produce unreliable overbought/oversold signals, leading to incorrect momentum
      assessments
    stage_ids:
    - technical_analysis
  - id: finance-C-020
    when: When computing MA60 for stocks with fewer than 60 trading days
    action: fall back to MA20 as MA60 substitute to prevent NaN values
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Missing MA60 causes null values in trend analysis output, breaking downstream consumers expecting numeric
      fields
    stage_ids:
    - technical_analysis
  - id: finance-C-021
    when: When input DataFrame is provided to StockTrendAnalyzer.analyze()
    action: sort DataFrame by date before performing any technical calculations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Unsorted time series causes rolling means and MACD to compute on wrong sequence, producing inverted or nonsensical
      trend signals
    stage_ids:
    - technical_analysis
  - id: finance-C-022
    when: When identifying support levels near MA5 or MA10
    action: only include price levels within ±2% (MA_SUPPORT_TOLERANCE=0.02) of MA5/MA10 as valid support
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Overly wide support level tolerance causes false support signals, leading to premature buy signals at non-supportive
      price points
    stage_ids:
    - technical_analysis
  - id: finance-C-023
    when: When enforcing the 严进策略 (no chasing elevated prices)
    action: reject trading entries where price exceeds MA5 by more than bias_threshold (default 5%)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Chasing elevated prices (>5% above MA5) leads to buying at unsustainable levels, resulting in immediate drawdowns
      and losses when price reverts to mean
    stage_ids:
    - technical_analysis
  - id: finance-C-024
    when: When determining TrendAnalysisResult.trend_status
    action: 'reflect MA alignment correctly: bull requires MA5 > MA10 > MA20, bear requires MA5 < MA10 < MA20'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect MA alignment logic causes wrong trend classification, leading to trades against the actual trend
      direction
    stage_ids:
    - technical_analysis
  - id: finance-C-025
    when: When producing TrendAnalysisResult.signal output
    action: 'output signal from BuySignal enum: strong_buy, buy, hold, sell, strong_sell (or wait)'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Non-enum signal values break downstream consumers expecting structured BuySignal, causing notification failures
      or incorrect trading decisions
    stage_ids:
    - technical_analysis
  - id: finance-C-026
    when: When calculating bias values for trend analysis
    action: 'compute bias as percentage deviation from MA5 per formula: (Close - MA5) / MA5 * 100%'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Incorrect bias formula causes wrong pullback/overextended assessment, leading to missed buy opportunities
      or false signals
    stage_ids:
    - technical_analysis
  - id: finance-C-027
    when: When the system presents technical analysis results to users
    action: present backtest returns as guaranteed future trading performance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting simulated backtest results as real execution proof violates financial regulations and misleads
      users about expected returns
    stage_ids:
    - technical_analysis
  - id: finance-C-028
    when: When the system generates trend signals for live trading
    action: claim real-time trading capability when technical analysis uses polling-based data with inherent delay
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Misrepresenting delayed polling data as real-time causes users to make trading decisions based on stale information,
      leading to missed entries/exits
    stage_ids:
    - technical_analysis
  - id: finance-C-029
    when: When implementing the StockTrendAnalyzer.analyze() method
    action: skip data validation checks even when data appears sufficient for quick analysis
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping data validation for edge cases causes subtle bugs to propagate undetected, requiring extensive debugging
      later
    stage_ids:
    - technical_analysis
  - id: finance-C-030
    when: When optimizing the bias threshold parameter for short-term gains
    action: lower bias_threshold below 1.0 to appear more aggressive in backtests
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Setting bias_threshold below minimum (1.0) causes overly conservative signals, missing valid pullback entry
      opportunities
    stage_ids:
    - technical_analysis
  - id: finance-C-033
    when: When building tool cache key for data fetching
    action: normalize stock_code to canonical form for consistent cache hits
    severity: medium
    kind: domain_rule
    modality: must
    consequence: Non-normalized stock codes (HK00700 vs hk00700 vs 00700.HK) create separate cache entries for the same stock,
      causing redundant API calls and increased latency.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-034
    when: When implementing multi-agent pipeline timeout
    action: return partial results with degraded dashboard rather than hanging indefinitely
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Pipeline timeout without partial result return causes complete analysis failure, blocking downstream notification
      and reporting stages even when partial data is usable.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-035
    when: When applying risk override in pipeline
    action: skip if risk_override already applied or agent_risk_override config disabled
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Double-apply risk override downgrades signal multiple steps (buy→hold→sell), causing overly conservative
      recommendations that contradict technical analysis.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-036
    when: When building dashboard with decision signal
    action: include signal, operation_advice (buy/hold/sell), and price targets
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing required dashboard fields breaks downstream notification rendering and causes incomplete or unrenderable
      push notifications to users.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-037
    when: When configuring LiteLLM Router for agent LLM calls
    action: claim real-time trading capability from LLM infrastructure
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: LiteLLM is a routing abstraction for model inference APIs—it polls external LLM providers with latency, it
      does not provide real-time trading execution or live market data feeds.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-038
    when: When configuring multi-agent pipeline timeout
    action: allocate cooperative timeout budget across each pipeline stages
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Unlimited per-stage timeout can cause a single slow agent to hang the entire pipeline indefinitely, blocking
      notifications and reporting for all stocks in batch.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-040
    when: When inserting specialist agents in specialist mode
    action: insert specialist agents lazily right before decision stage
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Inserting specialist agents before technical opinion is ready causes skill agents to lack prerequisite market
      data, producing unreliable or generic analysis.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-041
    when: When using decision agent for synthesis
    action: grant tool access to decision agent for live data fetching
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Decision agent making tool calls causes redundant data fetching after technical/intel stages complete, increasing
      latency and potentially fetching stale or inconsistent data mid-synthesis.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-042
    when: When implementing agent opinion aggregation
    action: aggregate skill opinions before decision agent runs
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skipping skill aggregation before decision synthesis causes decision agent to receive raw individual skill
      opinions without consensus, leading to conflicting or indecisive recommendations.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-043
    when: When implementing risk override logic
    action: downgrade buy signal to hold when risk veto conditions met
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Failure to downgrade buy signals on high-severity risk flags exposes users to concentrated losses during
      adverse market conditions that the risk agent explicitly identified.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-044
    when: When caching tool execution results
    action: cache non-retriable tool results to prevent infinite retry loops
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without caching non-retriable results, the agent continuously retries failed tools that explicitly indicate
      permanent failure, wasting LLM tokens and API quota.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-045
    when: When developing multi-agent pipeline features
    action: perform refactoring or infrastructure changes outside the current task scope
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Unrelated refactoring introduces regressions in agent coordination, timeout handling, or signal normalization,
      causing silent failures in production analysis runs.
    stage_ids:
    - multi_agent_pipeline
  - id: finance-C-047
    when: When loading a Skill from YAML, the YAML root MUST be a dictionary mapping
    action: validate data isinstance(data, dict) before accessing skill fields
    severity: high
    kind: domain_rule
    modality: must
    consequence: A YAML file with a list or scalar at root would raise KeyError on field access, causing skill loading to
      crash with an unhelpful traceback instead of a clear error message
    stage_ids:
    - skill_system
  - id: finance-C-049
    when: When loading a Skill from SKILL.md markdown bundle, the frontmatter YAML block MUST parse to a dictionary
    action: validate parsed frontmatter isinstance(metadata, dict) and raise ValueError otherwise
    severity: high
    kind: domain_rule
    modality: must
    consequence: If frontmatter parses to a YAML list or scalar (e.g., malformed YAML), type-checking downstream will fail
      unpredictably when accessing skill metadata fields
    stage_ids:
    - skill_system
  - id: finance-C-050
    when: When parsing skill markdown instructions, the frontmatter delimiter MUST be properly formatted or the entire content
      MUST be treated as raw instructions
    action: gracefully handle missing/invalid frontmatter by treating raw_text as instructions directly
    severity: medium
    kind: domain_rule
    modality: must
    consequence: A SKILL.md file without valid --- delimiters would have its entire content treated as frontmatter YAML, causing
      yaml.safe_load to fail or produce unexpected results
    stage_ids:
    - skill_system
  - id: finance-C-051
    when: When constructing AgentOpinion, the confidence field MUST be clamped to [0.0, 1.0]
    action: clamp confidence via max(0.0, min(1.0, float(self.confidence))) in __post_init__
    severity: high
    kind: domain_rule
    modality: must
    consequence: An agent returning confidence > 1.0 or < 0.0 would corrupt the weighted aggregation in SkillAggregator, producing
      invalid weighted_score and distorted consensus signals
    stage_ids:
    - skill_system
  - id: finance-C-052
    when: When the skill aggregator computes weighted_score, the signal MUST be mapped from _SIGNAL_SCORES dict or defaulted
      to 3.0
    action: use _SIGNAL_SCORES.get(op.signal, 3.0) for signal-to-score conversion
    severity: medium
    kind: domain_rule
    modality: must
    consequence: An unknown signal string would silently map to 3.0 (hold), masking agent errors where signal is misspelled
      or malformed instead of surfacing the issue
    stage_ids:
    - skill_system
  - id: finance-C-054
    when: When loading skills from a directory, individual file parse failures MUST be caught and logged as warnings rather
      than raising exceptions
    action: wrap load_skill_from_yaml and load_skill_from_markdown in try/except and log warning on failure
    severity: high
    kind: resource_boundary
    modality: must
    consequence: A single malformed skill YAML would crash the entire SkillManager loading, preventing all other valid skills
      from being loaded and breaking the trading analysis pipeline
    stage_ids:
    - skill_system
  - id: finance-C-055
    when: When the router has no skill opinions to route (empty skill catalog), it MUST fall back to default router skills
    action: call get_default_router_skill_ids() as final fallback when regime detection yields no results
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Empty skill catalog with no fallback would return an empty list, causing the agent pipeline to proceed without
      any trading skill guidance
    stage_ids:
    - skill_system
  - id: finance-C-056
    when: When loading the builtin skill catalog, failures MUST be caught and return an empty tuple without crashing
    action: wrap load_skills_from_directory in try/except and return empty tuple on failure
    severity: high
    kind: resource_boundary
    modality: must
    consequence: An exception in the cached builtin catalog loader would propagate to all callers, causing SkillRouter and
      skill resolution to fail across the entire application
    stage_ids:
    - skill_system
  - id: finance-C-057
    when: When router detects regime, trend_score values outside the valid range MUST be coerced to the neutral value of 50.0
    action: use try/except around float(trend_score) conversion with 50.0 as fallback
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Malformed trend_score (e.g., string 'unknown', None, or float('inf')) would crash regime detection or produce
      incorrect regime classification, routing wrong skills
    stage_ids:
    - skill_system
  - id: finance-C-058
    when: When backtest autoweight is used in the aggregator, the skill evaluation count MUST meet the min_samples threshold
      (30) before applying backtest-derived weights
    action: check summary.get('total_evaluations', 0) >= min_samples before applying backtest factor
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Applying backtest weights with insufficient evaluation samples would overweight a skill that hasn't been
      proven statistically, leading to poor trading decisions and financial losses
    stage_ids:
    - skill_system
  - id: finance-C-059
    when: When custom skills directory is loaded, skills with duplicate names MUST override builtin skills
    action: call self.register(skill) for custom skills after loading, which overwrites existing entries with same name
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: If custom skills were silently skipped on name collision, users' overridden strategies would not take effect,
      defeating the purpose of the custom skill system
    stage_ids:
    - skill_system
  - id: finance-C-060
    when: When SkillRouter selects skills, user-requested skills MUST take highest priority over automatic regime-based routing
    action: check ctx.meta.get('skills_requested') first before regime detection and default fallback
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Ignoring explicit user requests would cause the system to ignore user-specified strategies, violating the
      expected behavior that users can select specific skills
    stage_ids:
    - skill_system
  - id: finance-C-061
    when: When building skill instructions for agent prompts, only skills with enabled=True MUST be included in the combined
      instruction text
    action: filter by s.enabled using list_active_skills() before generating instruction text
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Including disabled skills in the agent prompt would inject irrelevant or intentionally deactivated trading
      strategies, causing confusing or contradictory analysis
    stage_ids:
    - skill_system
  - id: finance-C-062
    when: When user_invocable=False is set in a skill YAML, the skill MUST be excluded from natural language selectors and
      bot commands
    action: filter skills by user_invocable=True in _iter_candidate_skills() before returning selectable candidates
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: A skill marked non-user-invocable appearing in NL selectors would allow users to activate internal-only skills
      that are not meant for direct user interaction
    stage_ids:
    - skill_system
  - id: finance-C-063
    when: When implementing SkillManager.activate(), it MUST operate on a deepcopy clone, not the shared prototype
    action: verify factory.get_skill_manager() returns copy.deepcopy(prototype) to prevent mutation bleeding between concurrent
      requests
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Concurrent requests sharing the same SkillManager instance would have their skill activation state interfere
      with each other, causing skills to be unexpectedly activated or deactivated across sessions
    stage_ids:
    - skill_system
  - id: finance-C-064
    when: When the skill aggregator has no skill opinions in context.opinions, it MUST return None instead of raising an exception
    action: check if skill_opinions list is empty and return None early
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Returning None gracefully allows the pipeline to proceed without skill consensus; raising an exception would
      halt the entire analysis pipeline
    stage_ids:
    - skill_system
  - id: finance-C-065
    when: When regime detection uses ma_alignment and trend_score from technical opinion, the regime detection thresholds
      MUST match the expected regime tags in skill YAML files
    action: 'use consistent threshold values: trending_up (ma_alignment=bullish, trend_score>=70), trending_down (ma_alignment=bearish,
      trend_score<=30), sideways (neutral OR 35<=score<=65), volatile (volume_status=heavy AND 30<score<70)'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Mismatch between router regime thresholds and skill YAML regime tags would cause skills to never be selected
      for their intended market conditions, defeating the regime-based routing mechanism
    stage_ids:
    - skill_system
  - id: finance-C-066
    when: When computing backtest weights, the backtest_factor MUST be capped so total weight never exceeds 1.0 + max_win_rate
      (1.5)
    action: compute backtest_factor as 0.5 + win_rate where win_rate is in [0, 1], producing factor in [0.5, 1.5]
    severity: medium
    kind: domain_rule
    modality: must
    consequence: An unbounded backtest factor could dominate the weight calculation, causing skills with a few lucky trades
      to receive disproportionate influence over the consensus
    stage_ids:
    - skill_system
  - id: finance-C-067
    when: When a SkillAgent evaluates a skill, it MUST return an AgentOpinion with signal and confidence fields properly populated
    action: parse JSON output with try_parse_json and construct AgentOpinion with default 'hold' signal and 0.5 confidence
      on parse failure
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Returning None on parse failure would silently drop the skill opinion from the aggregation, reducing consensus
      diversity and potentially missing critical skill signals
    stage_ids:
    - skill_system
  - id: finance-C-068
    when: When the system presents skill-based analysis results, it MUST NOT claim that skill consensus signals are equivalent
      to human expert financial advice
    action: avoid presenting skill consensus as guaranteed profitable signals or certified financial recommendations
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting YAML-defined skill instructions as expert-level financial advice would mislead users into making
      investment decisions based on an unvalidated algorithmic pattern-matching system
    stage_ids:
    - skill_system
  - id: finance-C-069
    when: When skill consensus is computed via backtest autoweight, the backtest results MUST NOT be presented as live trading
      performance
    action: avoid presenting backtest-derived skill weights as real-time trading proof or live track record
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Backtest performance with historical data does not guarantee future live trading results due to slippage,
      liquidity, market impact, and regime changes not captured in backtest
    stage_ids:
    - skill_system
  - id: finance-C-070
    when: When SkillRouter returns skill selections, the system MUST NOT claim the selected skills are optimal or best-performing
    action: avoid presenting regime-based skill routing as an optimization that guarantees superior returns
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Regime detection uses simple threshold rules (e.g., trend_score>=70) which do not constitute quantitative
      optimization; presenting them as optimal would mislead users about the sophistication of the selection mechanism
    stage_ids:
    - skill_system
  - id: finance-C-071
    when: When building the router fallback for manual mode, the system MUST fallback to get_default_router_skill_ids when
      the configured skill list is empty or not available
    action: check if configured skill_ids intersect with available skills before returning; return default_router_skills on
      empty intersection
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Returning an empty list when configured skills are unavailable would cause the pipeline to run without any
      skill guidance instead of using sensible defaults
    stage_ids:
    - skill_system
  - id: finance-C-072
    when: When legacy code passes 'strategies_requested' instead of 'skills_requested', the router MUST accept the legacy
      field name for backward compatibility
    action: check ctx.meta.get('strategies_requested') as fallback when 'skills_requested' is absent
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Breaking backward compatibility would cause existing bot commands and API callers using the old 'strategies'
      terminology to silently fall through to regime-based routing
    stage_ids:
    - skill_system
  - id: finance-C-073
    when: When the SkillManager loads a custom skills directory that does not exist, it MUST log a warning and return 0 without
      raising an exception
    action: check directory.is_dir() before loading and return 0 on non-existent directory
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Raising an exception on missing custom directory would crash the entire agent initialization, preventing
      the system from functioning even with valid builtin skills
    stage_ids:
    - skill_system
  - id: finance-C-074
    when: When _coerce_int, _coerce_bool, or _coerce_string_list encounter invalid input types, they MUST return the provided
      default value instead of raising exceptions
    action: wrap type conversions in try/except and return default on ValueError/TypeError
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Raising exceptions from coercion functions would crash skill loading for any YAML field with an unexpected
      type, preventing valid skills from loading due to minor metadata typos
    stage_ids:
    - skill_system
  - id: finance-C-075
    when: When validating skill IDs from request/config, unknown skill IDs MUST be ignored and logged, with known skills still
      being used
    action: separate skill IDs into valid and unknown sets via _normalize_skill_ids, log warnings for unknown, return only
      valid
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Treating a partially-invalid skill list as entirely invalid would discard all known skills and fall back
      to defaults, unnecessarily reducing the skills available for analysis
    stage_ids:
    - skill_system
  - id: finance-C-079
    when: When calculating cost basis
    action: include fee and tax in the cost basis calculation for buy trades
    severity: high
    kind: domain_rule
    modality: must
    consequence: Excluding fees and taxes from cost basis understates acquisition cost, overstating realized P&L and causing
      incorrect tax calculations
    stage_ids:
    - portfolio_management
  - id: finance-C-080
    when: When calculating stop-loss proximity
    action: alert when market price is within 80% of the stop-loss threshold (default 8%) of entry price
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stop-loss alerts may fire too late or not at all, exposing the portfolio to losses beyond acceptable risk
      tolerance
    stage_ids:
    - portfolio_management
  - id: finance-C-082
    when: When FX rates are unavailable
    action: mark the FX conversion as stale and use the latest cached rate with fallback 1:1 if no cache exists
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Silent 1:1 fallback on missing FX rates produces incorrect portfolio valuations in foreign currencies, misleading
      risk assessments
    stage_ids:
    - portfolio_management
  - id: finance-C-083
    when: When building drawdown history
    action: backfill missing daily snapshots within the lookback window (default 180 days)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing snapshot data points cause drawdown calculation gaps, resulting in understated or incorrect maximum
      drawdown metrics
    stage_ids:
    - portfolio_management
  - id: finance-C-084
    when: When writing a backdated trade event
    action: invalidate each cached snapshots from the trade date forward
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Stale cached snapshots cause portfolio snapshot to show incorrect positions and P&L, corrupting all downstream
      risk reports
    stage_ids:
    - portfolio_management
  - id: finance-C-086
    when: When portfolio FX refresh is disabled via configuration
    action: skip yfinance fetch and report disabled status without crashing
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: FX refresh crash blocks all portfolio operations when disabled, breaking scheduled analysis pipelines
    stage_ids:
    - portfolio_management
  - id: finance-C-087
    when: When replaying portfolio events
    action: replay events from the source tables (trades, cash ledger, corporate actions) rather than from cached snapshot
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Reading from cached snapshot instead of replaying events causes stale or incorrect position data to propagate
      through the system
    stage_ids:
    - portfolio_management
  - id: finance-C-088
    when: When calculating portfolio concentration
    action: normalize each positions to CNY before calculating weight percentages
    severity: high
    kind: domain_rule
    modality: must
    consequence: Mixed-currency concentration without normalization causes misleading sector exposure percentages, leading
      to incorrect diversification decisions
    stage_ids:
    - portfolio_management
  - id: finance-C-090
    when: When processing corporate action of type split_adjustment
    action: adjust both quantity and unit_cost inversely for FIFO lots (quantity *= ratio, cost /= ratio)
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unadjusted split causes cost basis miscalculation on remaining lots, resulting in incorrect realized P&L
      on subsequent sells
    stage_ids:
    - portfolio_management
  - id: finance-C-091
    when: When building portfolio snapshot for risk reporting
    action: use the as_of date consistently for each FX conversions and price lookups
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Using current date instead of as_of for FX rates causes historical snapshot to reflect present currency values,
      corrupting historical risk reports
    stage_ids:
    - portfolio_management
  - id: finance-C-092
    when: When validating split_ratio for corporate actions
    action: reject split_ratio values that are zero or negative
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negative or zero split ratio causes quantity overflow or division errors, corrupting all position calculations
    stage_ids:
    - portfolio_management
  - id: finance-C-093
    when: When claiming portfolio analysis capabilities
    action: claim real-time trading or live order execution capability
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Presenting portfolio service as live trading system misleads users into making actual trades based on simulated
      data, causing financial losses
    stage_ids:
    - portfolio_management
  - id: finance-C-094
    when: When reporting portfolio returns or P&L
    action: present realized P&L as guaranteed future results
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Backtest-style P&L claims create false expectations; actual trading returns will differ due to slippage,
      fees, timing, and market impact
    stage_ids:
    - portfolio_management
  - id: finance-C-095
    when: When stale FX rates are present
    action: propagate the stale flag in portfolio snapshot to alert downstream risk calculations
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Silent stale FX without propagation causes risk reports to show incorrect valuations without warning, compromising
      investment decisions
    stage_ids:
    - portfolio_management
  - id: finance-C-096
    when: When determining available quantity for sell validation
    action: consider split adjustments that have occurred since position acquisition
    severity: high
    kind: domain_rule
    modality: must
    consequence: Ignoring split adjustments causes sell validation to fail or succeed incorrectly, leading to position errors
      or rejected valid sells
    stage_ids:
    - portfolio_management
  - id: finance-C-097
    when: When processing cash dividends from corporate actions
    action: calculate dividend proceeds based on quantity held at ex-dividend date
    severity: high
    kind: domain_rule
    modality: must
    consequence: Incorrect dividend calculation causes wrong cash balance and P&L, leading to discrepancy between expected
      and actual cash
    stage_ids:
    - portfolio_management
  - id: finance-C-098
    when: When accepting cost_method parameter
    action: normalize and validate that cost_method is only 'fifo' or 'avg'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid cost method causes AttributeError or wrong P&L calculation, corrupting portfolio snapshot
    stage_ids:
    - portfolio_management
  - id: finance-C-099
    when: When accepting market parameter
    action: normalize and validate that market is only 'cn', 'hk', or 'us'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Invalid market value causes ValueError or wrong default currency, breaking portfolio operations for that
      account
    stage_ids:
    - portfolio_management
  - id: finance-C-100
    when: When using yfinance for FX rate fetching
    action: expect real-time FX rates (yfinance has 15-minute delay for most pairs)
    severity: medium
    kind: resource_boundary
    modality: must_not
    consequence: Assuming yfinance provides real-time FX causes stale or delayed valuations to be presented as current, misleading
      risk decisions
    stage_ids:
    - portfolio_management
  - id: finance-C-101
    when: When implementing stock return percentage calculation
    action: Use float type for each price-to-percentage conversions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using float for monetary calculations in the backtest engine is an explicit domain design. All percentage
      conversions use float() (lines 172, 206, 394), not Decimal. Mixing types or using Decimal without consistent context
      would corrupt computed max_return, stock_return_pct, and simulated_return_pct fields.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-103
    when: When invoking evaluate_single for a stock with a valid start_price
    action: Verify start_price is a positive number greater than zero
    severity: high
    kind: domain_rule
    modality: must
    consequence: A None or non-positive start_price causes the engine to return eval_status='error', discarding the evaluation.
      This silently suppresses backtest results for valid analysis records, causing the backtest summary to undercount evaluations.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-104
    when: When passing forward_bars to evaluate_single
    action: Verify forward_bars contains at least eval_window_days bars
    severity: high
    kind: domain_rule
    modality: must
    consequence: If forward_bars is shorter than the evaluation window, evaluate_single returns eval_status='insufficient_data',
      skipping that evaluation. This causes the backtest to silently drop older analysis records near the data cutoff, biasing
      the summary toward recent analyses.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-105
    when: When classifying outcomes using _classify_outcome
    action: Apply the absolute value of neutral_band_pct as the symmetric band threshold
    severity: high
    kind: domain_rule
    modality: must
    consequence: The neutral band threshold is computed as abs(float(neutral_band_pct)) at line 393, making the band always
      positive and symmetric. Passing a negative neutral_band_pct or ignoring the abs() call would shift the neutral classification
      threshold, misclassifying outcomes and corrupting win/loss/neutral counts in the summary.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-106
    when: When handling stop-loss and take-profit targets that both trigger on the same bar
    action: Classify first_hit as ambiguous and use stop_loss as the simulated exit price
    severity: high
    kind: domain_rule
    modality: must
    consequence: Daily bars cannot determine intraday ordering of high/low touches. When both stop_loss and take_profit are
      hit in the same bar, the code must set first_hit='ambiguous' and exit_price=stop_loss per the documented invariant.
      Violating this rule would make the simulated return non-deterministic, breaking reproducibility.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-107
    when: When inferring position_recommendation from operation_advice
    action: Map bearish and wait signals to cash position, and bullish or hold signals to long position
    severity: high
    kind: domain_rule
    modality: must
    consequence: The backtest engine is explicitly long-only. Any non-long position must resolve to 'cash', causing simulated_return_pct
      to be 0.0 and first_hit to be 'not_applicable'. Incorrectly mapping sell/wait advice to 'long' would simulate non-existent
      long positions, fabricating positive and negative returns that never occurred.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-108
    when: When evaluating stop-loss and take-profit triggers over daily bars
    action: Use bar.low for stop_loss comparison and bar.high for take_profit comparison
    severity: high
    kind: domain_rule
    modality: must
    consequence: Stop-loss checks against bar.low (not close) and take-profit against bar.high (not close). Using close prices
      would miss intraday breakdowns/rallies, causing false negatives for stop_loss triggers and false negatives for take_profit
      triggers. This would distort the simulated_return_pct and first_hit fields.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-109
    when: When reading the BacktestEngine module documentation
    action: Treat the engine as DB-agnostic pure logic with no database access capabilities
    severity: high
    kind: resource_boundary
    modality: must
    consequence: The BacktestEngine module is intentionally DB-agnostic and operates only on in-memory DailyBarLike objects.
      Any attempt to add database access (direct SQL, ORM queries, file I/O) to the engine would break the DB-agnostic contract,
      couple it to storage implementations, and prevent reuse in environments without the database layer.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-110
    when: When building a dynamic summary with date filters
    action: Enforce the 2000-row cap on filtered backtest results
    severity: high
    kind: resource_boundary
    modality: must
    consequence: The MAX_DYNAMIC_SUMMARY_ROWS limit of 2000 prevents unbounded memory consumption when computing date-filtered
      summaries. If the cap is bypassed, a large result set would cause memory exhaustion or extremely slow aggregation, potentially
      crashing the process.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-111
    when: When querying skill-specific backtest summaries
    action: Return None when no skill-tagged backtest summaries exist in storage
    severity: high
    kind: resource_boundary
    modality: must
    consequence: get_skill_summary intentionally returns None because the storage layer only persists overall and per-stock
      rollups. Returning a fabricated skill-specific summary would fabricate performance metrics and mislead auto-weighting
      systems into believing skill-specific data exists when it does not.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-112
    when: When computing max_high and min_low over the evaluation window
    action: Compute max_high as the maximum of each bar.high values, and min_low as the minimum of each bar.low values
    severity: high
    kind: domain_rule
    modality: must
    consequence: The engine computes max_high = max(highs) and min_low = min(lows) over window_bars, using bar.high for highs
      and bar.low for lows (not bar.close). Using bar.close for these fields would lose the intraday range information, breaking
      the distinction between closing price movement and maximum drawdown.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-113
    when: When deriving BacktestResult.direction_expected from operation_advice
    action: 'Apply the keyword priority order: bearish→down, wait→flat, bullish→up, hold→not_down, unrecognized→flat'
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The direction_expected field is derived via infer_direction_expected with a specific keyword priority order.
      Violating this order or hardcoding mappings would cause direction_expected to be incorrectly set, corrupting direction_correct,
      outcome (win/loss/neutral), and all directional accuracy metrics in the summary.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-115
    when: When classifying outcome as win, loss, or neutral
    action: Apply neutral_band_pct as the symmetric ±threshold for the 'up' and 'down' directions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The neutral classification uses neutral_band_pct (default ±2%) as a symmetric band around zero. For direction_expected='up',
      returns >=band are win and <=-band are loss; for 'down', returns <=-band are win and >=band are loss. Misapplying the
      band (e.g., one-sided or band-relative) would corrupt the outcome classification, breaking win_rate_pct and direction_accuracy_pct
      in the summary.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-116
    when: When computing win_rate_pct in the summary aggregation
    action: Compute win_rate_pct only from the sum of win and loss counts, excluding neutral outcomes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: The win rate denominator is win_count + loss_count only (line 267), excluding neutral outcomes. Including
      neutral outcomes in the denominator would artificially lower win_rate_pct, misrepresenting strategy accuracy. This metric
      feeds into Agent memory for auto-weighting decisions.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-117
    when: When recomputing summaries after a backtest run
    action: Recompute both the overall scope summary and per-stock summaries for each touched codes
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: After running the backtest, _recompute_summaries must compute both the overall summary (scope='overall',
      code=OVERALL_SENTINEL_CODE) and per-stock summaries for every touched stock code. Skipping either rollup would leave
      the summary table stale or incomplete, causing downstream consumers to see outdated metrics.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-118
    when: When handling negated operation_advice text
    action: Treat negated keywords as non-matching, preventing false bullish/bearish classification
    severity: high
    kind: domain_rule
    modality: must
    consequence: Negated phrases like 'do not sell' or '不要卖出' must not match bearish keywords. The engine checks the text
      prefix before each keyword for negation patterns (lines 372-373, 377-380). Without negation handling, negated sell signals
      would be classified as bearish, causing direction_expected='down' for 'hold' positions, corrupting all directional metrics.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-119
    when: When computing average return metrics in the summary
    action: Exclude None values before averaging, returning None when each inputs are None
    severity: medium
    kind: domain_rule
    modality: must
    consequence: The _average method (line 516-520) filters out None values before summing. If all inputs are None (no completed
      evaluations with valid returns), it returns None, not zero. Returning zero instead of None would falsely indicate a
      measurable average return of 0%, misrepresenting the strategy's performance to downstream consumers.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-121
    when: When displaying simulated trading returns
    action: Label simulated returns as hypothetical and not equivalent to actual execution results
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Simulated returns (simulated_return_pct) are calculated using stop_loss and take_profit price levels that
      were theoretically reached, not actual fill prices from executed trades. Presenting these as proof of live trading profitability
      would be factually incorrect and could induce overconfidence in the system's predictive power.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-122
    when: When building skill-specific or strategy-specific summaries
    action: Fabricate skill-tagged or strategy-tagged performance metrics from overall or stock-level rollups
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: The storage layer only persists overall and per-stock rollups. Re-using these rollups as skill-specific or
      strategy-specific performance metrics would fabricate skill-level granularity, misleading auto-weighting systems into
      believing skill-specific data exists when it does not.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-124
    when: When adding new keyword mappings to infer_direction_expected
    action: Bypass the priority-based keyword matching by hardcoding direction values
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: infer_direction_expected uses a specific priority order (bearish > wait > bullish > hold > default). Hardcoding
      direction values or bypassing the keyword matching logic would break the negation guard (_is_negated), the keyword priority
      order, and the _matches_intent method. This would corrupt direction_expected for any advice text containing the new
      keywords.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-125
    when: When modifying the _classify_outcome method for new direction_expected values
    action: Skip the special handling for 'not_down' and 'flat' direction values
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: The 'not_down' direction (for 'hold' advice) uses r>=0 as win and r<=-band as loss. The 'flat' direction
      (for 'wait' advice) uses |r|<=band as win. These special rules differ from the 'up' and 'down' rules. Removing or replacing
      them would misclassify hold/wait outcomes, corrupting win_rate_pct, direction_accuracy_pct, and neutral_rate_pct in
      the summary.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-126
    when: When computing direction_accuracy_pct in the summary
    action: Exclude outcomes where direction_correct is None from both numerator and denominator
    severity: high
    kind: domain_rule
    modality: must
    consequence: direction_accuracy_pct is computed only from rows where direction_correct is not None (line 260-263). The
      denominator excludes neutral outcomes (where direction_correct=None). Including None values would artificially inflate
      or deflate the directional accuracy percentage, corrupting this key performance metric.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-127
    when: When running the backtest evaluation loop
    action: Process each candidate analysis independently and catch exceptions per-candidate
    severity: high
    kind: operational_lesson
    modality: must
    consequence: The backtest loop at run_backtest (lines 74-195) wraps each candidate evaluation in a try-except block. If
      an exception is not caught, it would abort the entire backtest run, losing all pending results_to_save and failing to
      save any completed evaluations. This would cause data loss for all candidates processed before the crash.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-128
    when: When reading backtest engine test coverage
    action: Verify each outcome combinations (win/loss/neutral for up/down/not_down/flat) and edge cases
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: The backtest engine has 19 test cases covering key scenarios but the outcome classification logic has 4 direction
      types × multiple return thresholds. Insufficient edge case coverage (e.g., zero-return boundaries, ambiguous same-bar
      hits, negated keywords) could allow classification bugs to go undetected, corrupting production backtest summaries.
    stage_ids:
    - backtest_evaluation
  - id: finance-C-131
    when: When generating buy/hold/sell emoji counts in reports
    action: Count signals by comparing decision_type field directly ('buy', 'sell', 'hold', or empty string) rather than deriving
      from sentiment scores
    severity: high
    kind: domain_rule
    modality: must
    consequence: Emoji counts will be inaccurate and misleading, showing wrong distribution of buy/hold/sell signals to users
      making investment decisions
    stage_ids:
    - notification_dispatch
  - id: finance-C-133
    when: When processing email routing with stock_email_groups configured
    action: Use get_receivers_for_stocks() to lookup email recipients based on analyzed stock codes, falling back to default
      receivers if no group matches
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Stock-specific email routing will be ignored, causing all email notifications to go to default recipients
      instead of designated group recipients
    stage_ids:
    - notification_dispatch
  - id: finance-C-134
    when: When configuring STOCK_GROUP_N and EMAIL_GROUP_N for email routing
    action: Verify each STOCK_GROUP_N contains only stock codes that are also in STOCK_LIST (subset relationship)
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Configuration validation will produce warnings, and email routing may silently fail for stocks outside STOCK_LIST,
      causing notifications to go to unintended recipients
    stage_ids:
    - notification_dispatch
  - id: finance-C-135
    when: When deploying on GitHub Actions with stock_email_groups
    action: Assume arbitrary numbered STOCK_GROUP_N and EMAIL_GROUP_N variables are automatically imported into the workflow
      environment
    severity: high
    kind: operational_lesson
    modality: must_not
    consequence: Email grouping functionality will silently fail because GitHub Actions default workflow does not auto-inject
      numbered environment variables; reports will go to unintended recipients or fail entirely
    stage_ids:
    - notification_dispatch
  - id: finance-C-136
    when: When enabling Feishu notifications
    action: Assume FEISHU_APP_ID and FEISHU_APP_SECRET alone will enable webhook notifications without configuring FEISHU_WEBHOOK_URL
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: Feishu notifications will silently fail because app credentials are for Stream Bot/Cloud Documents mode only,
      not for incoming webhook notifications
    stage_ids:
    - notification_dispatch
  - id: finance-C-137
    when: When configuring markdown-to-image conversion for notification channels
    action: Install wkhtmltopdf (via apt/brew) or npm markdown-to-file package for the configured md2img_engine
    severity: medium
    kind: resource_boundary
    modality: must
    consequence: Channels configured for markdown-to-image will fall back to text-only sending, losing visual formatting and
      potentially exceeding character limits on platforms like WeChat
    stage_ids:
    - notification_dispatch
  - id: finance-C-138
    when: When sending WeChat notifications with markdown-to-image content
    action: Verify image size is under WECHAT_IMAGE_MAX_BYTES (~2MB) before sending as image, falling back to markdown text
      if exceeded
    severity: high
    kind: resource_boundary
    modality: must
    consequence: WeChat will reject oversized images, causing complete notification failure instead of graceful markdown text
      fallback
    stage_ids:
    - notification_dispatch
  - id: finance-C-139
    when: When connecting to SMTP servers for email delivery
    action: Apply 30-second connection timeout to prevent indefinite blocking during network failures
    severity: high
    kind: resource_boundary
    modality: must
    consequence: Email sending will hang indefinitely during SMTP connection failures, blocking notification pipeline completion
      for all channels
    stage_ids:
    - notification_dispatch
  - id: finance-C-140
    when: When encoding email sender addresses with non-ASCII characters
    action: Use email.header.Header for RFC 2047 compliant MIME encoding of display names
    severity: high
    kind: domain_rule
    modality: must
    consequence: SMTP servers will reject or corrupt sender addresses containing Chinese characters (e.g., 股票分析助手), causing
      all email notifications to fail
    stage_ids:
    - notification_dispatch
  - id: finance-C-141
    when: When sending market review notifications with email_send_to_all flag
    action: Use get_all_email_receivers() to collect union of each group recipients plus default receivers
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Market review emails will only go to default receivers, missing group-specific recipients who should receive
      market-wide announcements
    stage_ids:
    - notification_dispatch
  - id: finance-C-142
    when: When processing notification channels that use polling (e.g., Telegram polling mode)
    action: Claim or imply the notification system provides real-time push delivery without acknowledging the polling-based
      nature
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: Users will expect immediate real-time delivery but receive delayed notifications based on polling intervals,
      leading to missed time-sensitive trading opportunities
    stage_ids:
    - notification_dispatch
  - id: finance-C-145
    when: When implementing persist_llm_usage or record_llm_usage
    action: raise exceptions to caller — logging must use try/except with warning-level log only
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: LLM usage logging is non-critical telemetry; if it raises, it disrupts the main analysis pipeline flow that
      calls it after every LLM completion
    stage_ids:
    - storage_persistence
  - id: finance-C-148
    when: When implementing has_today_data breakpoint continuation
    action: query exact (code, target_date) pair using equality on date column, NOT latest-trading-day semantics
    severity: high
    kind: domain_rule
    modality: must
    consequence: If has_today_data returns True on non-trading days (weekends/holidays) when only prior trading day data exists,
      the pipeline incorrectly skips fetching today's actual data, causing gap in historical record
    stage_ids:
    - storage_persistence
  - id: finance-C-149
    when: When implementing concurrent save_daily_data for same code+date from multiple threads
    action: count only genuinely new rows (inserted, not updated) in return value
    severity: high
    kind: domain_rule
    modality: must
    consequence: If save_daily_data returns non-zero count for rows that only got updated (not inserted), caller misinterprets
      as new data and may trigger redundant downstream processing
    stage_ids:
    - storage_persistence
  - id: finance-C-150
    when: When using SQLite with concurrent reader threads during active writes
    action: retry on OperationalError with 'database is locked' using exponential backoff up to sqlite_write_retry_max attempts
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Without retry logic, concurrent writes fail immediately, causing pipeline to crash or lose data when multiple
      stocks are processed simultaneously
    stage_ids:
    - storage_persistence
  - id: finance-C-151
    when: When implementing record_llm_usage for LLM audit logging
    action: block the main thread or propagate database exceptions — use async-safe fire-and-forget pattern
    severity: medium
    kind: operational_lesson
    modality: must_not
    consequence: LLM usage logging should not add latency to LLM response delivery; blocking on database write introduces
      unpredictable delays in the agent execution pipeline
    stage_ids:
    - storage_persistence
  - id: finance-C-152
    when: When initializing DatabaseManager as a singleton
    action: skip re-initialization if _initialized flag is True (idempotent __init__)
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Re-initializing the singleton creates a new engine without proper cleanup, causing 'SQLite objects created
      in a thread cannot be used in another thread' errors and resource leaks
    stage_ids:
    - storage_persistence
  - id: finance-C-153
    when: When defining database connection URL for SQLite file database
    action: 'use :memory: database when concurrent multi-threaded writes are expected'
    severity: high
    kind: resource_boundary
    modality: must_not
    consequence: ':memory: databases do not support file-based WAL mode; concurrent writes from multiple threads will deadlock
      or fail with ''database is locked'' since there is no file to back WAL'
    stage_ids:
    - storage_persistence
  - id: finance-C-154
    when: When tracking LLM usage for cost auditing purposes
    action: claim immediate read-after-write consistency for usage log queries
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: persist_llm_usage is fire-and-forget; if caller immediately queries get_llm_usage_summary expecting to see
      the newly written record, the record may not be visible yet due to SQLite transaction isolation
    stage_ids:
    - storage_persistence
  - id: finance-C-155
    when: When performing historical date-based analysis using get_analysis_context
    action: rely on has_today_data to determine whether historical data exists for a specific target_date
    severity: medium
    kind: claim_boundary
    modality: must_not
    consequence: get_analysis_context internally uses get_latest_data(code, days=2) which returns the 2 most-recent trading
      days, NOT the date exactly matching target_date; this causes incorrect context when analyzing historical dates
    stage_ids:
    - storage_persistence
  - id: finance-C-156
    when: When data_collection outputs pd.DataFrame to technical_analysis
    action: include OHLCV columns (open, high, low, close, volume) plus computed indicators (ma5, ma10, ma20, volume_ratio)
    severity: high
    kind: domain_rule
    modality: must
    consequence: TechnicalAnalysis stage receives incomplete data, causing trend analysis to fail or produce incorrect signal
      scores, as StockTrendAnalyzer.analyze() expects these exact columns at src/stock_analyzer.py:205-218
  - id: finance-C-157
    when: When data_collection writes data to ctx.data for multi_agent_pipeline
