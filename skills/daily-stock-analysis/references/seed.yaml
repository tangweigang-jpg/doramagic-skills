    derived_from_bd_id: BD-GAP-006
  - id: finance-C-203
    when: When implementing order processing logic in backtesting
    action: Assume the framework has a complete order lifecycle state machine with states PENDING, SUBMITTED, PARTIAL_FILLED,
      FILLED, CANCELLED, REJECTED, EXPIRED and valid state transitions — the framework does not implement this state machine
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without a defined order lifecycle state machine, order status changes cannot be tracked, causing order tracking
      failures and incorrect portfolio state calculations
    derived_from_bd_id: BD-GAP-033
  - id: finance-C-204
    when: When designing order management components in backtesting
    action: Implement explicit order state tracking with defined states (PENDING, SUBMITTED, PARTIAL_FILLED, FILLED, CANCELLED,
      REJECTED, EXPIRED) and validate each state transitions to prevent invalid order state progressions
    severity: high
    kind: domain_rule
    modality: must
    consequence: Missing order lifecycle state machine causes orders to remain in undefined states, leading to incorrect position
      calculations and reconciliation failures in backtest results
    derived_from_bd_id: BD-GAP-033
  - id: finance-C-205
    when: When calculating portfolio returns or strategy performance metrics
    action: Assume the framework accounts for funding/carry costs (short position costs, margin interest, overnight borrowing
      rates) — the framework does not implement funding cost modeling
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without funding cost modeling, strategies holding leveraged or short positions systematically overestimate
      returns by ignoring actual borrowing costs
    derived_from_bd_id: BD-GAP-034
  - id: finance-C-206
    when: When calculating strategy returns for leveraged or short positions
    action: Explicitly model funding costs by applying margin interest rates to long positions and short rebate rates to short
      positions, subtracting these from gross returns to obtain true net performance
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategies without funding cost modeling show inflated backtest returns that do not reflect actual borrowing
      costs, causing live trading performance to fall short of expectations
    derived_from_bd_id: BD-GAP-034
  - id: finance-C-207
    when: When modeling market order execution in backtesting
    action: Assume market orders always fill completely at the current price without volume constraints — the framework treats
      market orders as fully executable regardless of available volume
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Assuming complete market order fills causes strategies to overestimate execution probability, particularly
      for large orders in illiquid securities, leading to unrealistic backtest performance
    derived_from_bd_id: BD-GAP-035
  - id: finance-C-208
    when: When implementing market order execution logic in backtesting
    action: Implement volume-based fill modeling for market orders using available_volume and order_size to calculate actual
      fill quantity, applying slippage for partial fills to reflect realistic execution costs
    severity: high
    kind: domain_rule
    modality: must
    consequence: Backtests with unrealistic full-fill assumptions show higher returns than achievable in live trading where
      large orders experience partial fills and price slippage
    derived_from_bd_id: BD-GAP-035
  - id: finance-C-209
    when: When implementing finite difference methods for option pricing
    action: Assume finite difference grids are unconditionally stable without verifying stability conditions — the framework
      does not implement grid stability checks
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Unstable finite difference grids produce oscillating or diverging option prices, causing pricing errors that
      accumulate over time and corrupt risk calculations
    derived_from_bd_id: BD-GAP-036
  - id: finance-C-210
    when: When implementing finite difference option pricing models
    action: 'Verify grid parameters satisfy stability conditions: for explicit schemes verify dt <= (dx)²/(2σ²S²) per CFL
      condition; for implicit schemes validate convergence criteria; set maximum iteration count and check for solution divergence'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Unstable finite difference grids produce oscillating or divergent numerical solutions, making option pricing
      unreliable and potentially causing significant valuation errors in risk management
    derived_from_bd_id: BD-GAP-036
  - id: finance-C-211
    when: When implementing strategy optimization algorithms
    action: Assume the optimization constraint system is complete and consistent without checking for constraint conflicts
      or redundancy — the framework does not implement constraint validation
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Incomplete or conflicting optimization constraints cause the optimizer to fail silently or produce invalid
      portfolios, leading to strategy parameter misoptimization
    derived_from_bd_id: BD-GAP-037
  - id: finance-C-212
    when: When implementing strategy optimization
    action: Implement constraint validation that checks for infeasibility (no solution satisfies each constraints), redundancy
      (constraints that never bind), and conflicts (mutually exclusive requirements) before running optimization
    severity: high
    kind: domain_rule
    modality: must
    consequence: Optimizers with incomplete constraint validation may converge to infeasible solutions or miss optimal portfolios
      due to hidden constraint conflicts, producing suboptimal strategy parameters
    derived_from_bd_id: BD-GAP-037
  - id: finance-C-213
    when: When selecting volatility models or return distributions for option pricing
    action: Assume a single volatility model applies universally without validating model assumptions against market conditions
      — the framework does not implement volatility model selection guidance
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Using inappropriate volatility models for specific underlyings causes systematic pricing errors, leading
      to incorrect hedge ratios and unexpected losses when models fail to capture smile/skew dynamics
    derived_from_bd_id: BD-GAP-038
  - id: finance-C-214
    when: When selecting volatility models for option pricing
    action: 'Validate model assumptions before selection: for equity options use Heston or SABR to capture skew; for interest
      rate derivatives use Hull-White or LMM; verify chosen distribution matches observed implied volatility surface'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Strategies using mismatched volatility models suffer from systematic pricing bias, causing incorrect Greeks
      calculation and suboptimal hedging that increases rather than reduces risk
    derived_from_bd_id: BD-GAP-038
  - id: finance-C-215
    when: When implementing data processing pipelines with feature engineering
    action: Apply fit and transform operations on the same data in the same pipeline run — the framework does not enforce
      fit/transform isolation, causing look-ahead bias
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Fitting and transforming on the same data introduces look-ahead bias where future information leaks into
      training features, causing backtest results that significantly overestimate live trading performance
    derived_from_bd_id: BD-GAP-039
  - id: finance-C-216
    when: When implementing data processing pipelines with feature scaling or transformations
    action: 'Separate fit and transform stages: fit scalers/encoders only on historical in-sample data, then apply transform
      to new data; use separate pipeline instances for train/validation/test sets to prevent information leakage'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Pipeline without fit/transform isolation introduces look-ahead bias that inflates backtest returns, causing
      live trading to fail to replicate expected performance due to feature information leakage
    derived_from_bd_id: BD-GAP-039
  - id: finance-C-217
    when: When implementing volume ratio calculation logic
    action: Use shift(1) to align volume ratio calculation with historical data available at decision time, ensuring no look-ahead
      bias is introduced
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using shift(0) instead of shift(1) introduces look-ahead bias, causing volume ratio calculations to include
      data not yet available at decision time and systematically inflating backtested performance beyond what live trading
      can achieve
    derived_from_bd_id: BD-003
  - id: finance-C-218
    when: When implementing agent skill loading mechanism
    action: Load skills from YAML files with natural language instructions — maintain version control and audit trail capability
      for each skill definitions
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Changing to runtime database storage loses version control and makes skill rollback difficult or impossible,
      breaking the audit trail requirement for production trading agents
    derived_from_bd_id: BD-008
  - id: finance-C-219
    when: When implementing trend analysis and buy/sell decision logic
    action: Maintain the bias threshold at 5% for no-chase policy (乖离率 > 5% must not trigger buy signals) — enforce strict
      no-chase discipline to prevent FOMO-driven entries
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying the bias threshold below 5% allows buying at extreme overbought levels, increasing exposure to
      mean-reversion losses and violating the strict no-chase discipline principle that protects against emotional trading
      decisions
    derived_from_bd_id: BD-001
  - id: finance-C-220
    when: When implementing or extending the decision type enum in analysis/decision stage
    action: Extend the decision_type enum beyond buy/hold/sell — the three-value taxonomy must remain to prevent cascading
      failures across notification, portfolio, and reporting modules
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Adding new decision types like 'reduce' or 'add' without corresponding updates to all downstream modules
      causes downstream systems to misinterpret signals, leading to incorrect portfolio actions and reporting errors
    derived_from_bd_id: BD-004
  - id: finance-C-222
    when: When configuring CORS settings in production API deployments
    action: Use wildcard CORS origin (*) — wildcard origin allows unauthorized cross-site requests; must configure explicit
      allowed origins via CORS_ORIGINS environment variable for production
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Wildcard CORS configuration exposes the API to cross-site request forgery attacks, allowing malicious websites
      to make authenticated requests on behalf of users
    derived_from_bd_id: BD-011
  - id: finance-C-224
    when: When implementing agent orchestrator chaining logic
    action: Verify specialist agents are inserted at the index of the 'decision' agent, after technical analysis completes
      but before decision synthesis; verify the insertion position dynamically based on where 'decision' agent appears in
      the chain
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Incorrect insertion ordering causes the router to lack completed technical analysis for regime detection,
      or specialists to run at wrong phase, silently distorting routing decisions and final action recommendations
    derived_from_bd_id: BD-089
  - id: finance-C-225
    when: When configuring or modifying bias relaxation or no-chase policy parameters
    action: Review parameter interactions between bias relaxation rules (BD-055) and no-chase discipline (BD-001); monitor
      that relaxation during strong uptrends does not create conditions for extended overbought buying that contradicts risk
      management intent
    severity: high
    kind: operational_lesson
    modality: must
    consequence: When both bias relaxation and no-chase overrides trigger simultaneously, the system buys stocks that have
      deviated significantly from moving averages precisely when mean-reversion risk is highest, leading to losses when extended
      uptrends eventually reverse
    derived_from_bd_id: BD-090
  - id: finance-C-226
    when: When using the framework's skill aggregator weighting formula
    action: Verify that skill_aggregator weight formula uses confidence * (0.5 + win_rate) with min_samples=30 threshold;
      verify normalization is applied to maintain mean=1.0 to prevent weight inflation
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using incorrect min_samples threshold or skipping normalization causes skills with low historical accuracy
      to receive disproportionately high weights, distorting action recommendations based on unreliable performance data
    derived_from_bd_id: BD-085
  - id: finance-C-227
    when: When implementing or modifying signal scoring logic
    action: 'Maintain the 100-point scoring system with fixed weights: trend=30, bias=20, volume=15, MACD=15, support=10,
      RSI=10; any weight modification requires comprehensive backtesting to validate continued edge preservation'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Modifying scoring weights without backtesting changes the relative importance of technical factors, potentially
      degrading signal quality and causing strategies to underperform or generate false signals
    derived_from_bd_id: BD-016
  - id: finance-C-228
    when: When training machine learning models within the framework
    action: Assume the framework automatically handles train/test time split integrity — the framework does not implement
      temporal data separation validation; training data may include future information relative to test periods
    severity: high
    kind: claim_boundary
    modality: must_not
    consequence: Without proper train/test time split validation, models trained on temporally mixed data exhibit look-ahead
      bias, causing live trading performance to diverge significantly from backtested results
    derived_from_bd_id: BD-GAP-032
  - id: finance-C-229
    when: When preparing data for ML model training in the framework
    action: 'Implement temporal validation: verify each training samples have timestamps strictly before each test samples,
      and add assertion checks verifying no feature values in training set are derived from future data relative to the model
      evaluation period'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Models trained on temporally leaked data produce artificially inflated backtest metrics; live trading returns
      will fall far below backtested performance, leading to strategy abandonment based on false signals
    derived_from_bd_id: BD-GAP-032
  - id: finance-C-230
    when: When configuring LLM vision provider settings in production deployments
    action: Change the vision model fallback priority order without empirical validation — the current sequence gemini→anthropic→openai
      was calibrated for cost-efficiency, capability, and availability tradeoffs respectively
    severity: high
    kind: domain_rule
    modality: must_not
    consequence: Reordering the vision provider priority without testing can increase API costs by 30-200% (OpenAI being most
      expensive) or reduce chart analysis reliability if a less-capable provider becomes primary
    derived_from_bd_id: BD-025
  - id: finance-C-231
    when: When configuring the analysis delay parameter between market review and individual stock analysis
    action: Verify that the delay parameter value aligns with data freshness requirements for your use case - zero delay (default)
      means both analyses use the same data snapshot, while positive delay ensures market analysis completes first
    severity: high
    kind: domain_rule
    modality: must
    consequence: Using default delay=0 causes market context and individual stock analysis to share identical data snapshots,
      potentially missing regime changes that occur between data collection timestamps and causing strategy signals to lack
      timely market context
    derived_from_bd_id: BD-021
  - id: finance-C-232
    when: When modifying MA alignment criteria (BD-002) or trend scoring weights (BD-016) in the composite signal system
    action: Re-calibrate both MA alignment thresholds and trend scoring weights together — changing BD-002 (MA5>MA10>MA20
      alignment for uptrend) without adjusting BD-016 (30pts trend status weight in 100-point system) will systematically
      shift the entire composite signal decision boundary
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Without coordinated re-calibration, modifying MA alignment criteria cascades to composite signal scores,
      potentially causing systematic over-weighting or under-weighting of trend-following signals in live trading compared
      to backtested results
    derived_from_bd_id: BD-091
  - id: finance-C-233
    when: When configuring the composite signal scoring system for backtesting
    action: Verify that the 100-point weighted scoring system and indicator weights match the predictive validity characteristics
      of the target asset class, as the current weights assume trend and momentum indicators have higher predictive validity
      than volume indicators
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default indicator weights without validation may produce systematically biased signals for asset classes
      where volume indicators have higher predictive power, causing backtest results to diverge significantly from live trading
      performance
    derived_from_bd_id: BD-056
  - id: finance-C-234
    when: When configuring the signal threshold bands for buy/sell decisions
    action: Verify that the signal threshold band boundaries (strong positive vs strong negative score ranges) align with
      the volatility and risk tolerance of the target strategy, as the hold zone boundaries determine trade frequency and
      signal sensitivity
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Using default threshold bands without validation may cause either excessive trading (narrow hold zone) or
      missed opportunities (wide hold zone), systematically overestimating or underestimating strategy performance
    derived_from_bd_id: BD-057
  - id: finance-C-235
    when: When configuring double bottom pattern detection in backtesting
    action: Verify that the 3% tolerance for identifying double bottom reversal patterns matches the typical price variation
      of the target asset class, as this tolerance defines the boundary between pattern validity and market noise
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: A 3% tolerance that is too tight for volatile assets may miss valid double bottom patterns, while the same
      tolerance may be too loose for low-volatility assets, accepting false patterns as valid reversal signals and causing
      losses on failed breakouts
    derived_from_bd_id: BD-062
  - id: finance-C-236
    when: When implementing or refactoring realtime quote caching logic in data collection
    action: Set realtime quote cache TTL to 10 minutes (600 seconds) exactly — this 10-minute boundary balances intraday price
      freshness against API rate limits
    severity: high
    kind: domain_rule
    modality: must
    consequence: Reducing TTL below 10 minutes causes excessive API usage and potential rate limiting; increasing TTL above
      10 minutes causes stale intraday data, leading to wrong trading decisions based on outdated prices
    derived_from_bd_id: BD-065
  - id: finance-C-237
    when: When implementing or refactoring rate limiting logic in data collection
    action: Apply randomized jitter between 0.5x and 1.5x of base delay to rate-limited requests — do not use fixed delay
      or deterministic patterns
    severity: high
    kind: domain_rule
    modality: must
    consequence: Without jitter, concurrent requests trigger at the same time causing thundering herd API failures; fixed
      delays create synchronized spikes that overwhelm downstream APIs
    derived_from_bd_id: BD-066
  - id: finance-C-238
    when: When implementing or refactoring agent executor construction in inheritance stage
    action: Remove legacy alias mappings (build_executor→build_agent_executor, StrategyAggregator→SkillAggregator, StrategyRouter→SkillRouter)
      unless backward compatibility is explicitly deprecated with migration path
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: Removing legacy aliases breaks existing integrations that rely on old naming conventions, causing runtime
      import or instantiation errors for consumers who have not migrated to new Skill terminology
    derived_from_bd_id: BD-084
  - id: finance-C-239
    when: When implementing or refactoring name-to-code resolution logic in lookup stage
    action: 'Follow the resolution sequence exactly: (1) code-like check first, (2) local STOCK_NAME_MAP second, (3) AkShare
      fetch last — do not reorder or skip steps'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Skipping the code-like check forces unnecessary expensive AkShare API calls; skipping local map causes redundant
      API fetches; reversing order to AkShare-first causes failures when AkShare is down and wastes API quota
    derived_from_bd_id: BD-GAP-013
  - id: finance-C-240
    when: When implementing or refactoring stock code normalization logic in validation stage
    action: 'Apply market-specific normalization rules: A-shares/HK markets require 5-6 digit codes, US markets require 1-5
      letter codes — enforce strict patterns to prevent cross-market code collision'
    severity: high
    kind: domain_rule
    modality: must
    consequence: Relaxed validation causes cross-market code collision where a valid code from one market matches a different
      security in another market, leading to wrong stock selection and incorrect trading decisions
    derived_from_bd_id: BD-GAP-016
  - id: finance-C-241
    when: When implementing directory-based changes
    action: Place backend logic in src/, data_provider/, api/, bot/ directories; Web frontend in apps/dsa-web/; desktop in
      apps/dsa-desktop/; deployment and pipeline changes in scripts/, .github/workflows/, docker/
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Violating directory boundaries causes confusion about ownership, breaks CI governance checks, and violates
      the single-source-of-truth principle for AI collaboration rules
  - id: finance-C-242
    when: When the AGENTS.md document conflicts with script/workflow/code reality
    action: Trust actual executable code and workflows over documentation, then fix the documentation during the relevant
      change
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Following outdated documentation leads to failed executions, broken workflows, and wasted development time
      when actual code behavior differs
  - id: finance-C-243
    when: When a single data source fails during analysis
    action: Let the analysis continue with remaining data sources instead of crashing the entire flow, unless fail-fast is
      explicitly required
    severity: high
    kind: architecture_guardrail
    modality: must_not
    consequence: A single data source failure crashes the entire analysis pipeline, blocking all downstream processing including
      reports and notifications
  - id: finance-C-244
    when: When a single notification channel fails
    action: Let the main analysis flow continue without crashing when one notification channel fails, unless fail-fast is
      explicitly required
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: A single notification channel failure (e.g., Telegram down) crashes the entire analysis flow, preventing
      reports from being generated
  - id: finance-C-245
    when: When adding new configuration items
    action: Synchronously update .env.example and related documentation when adding new configuration options
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing .env.example updates cause developers to misconfigure the system, leading to runtime errors or unexpected
      behavior when deployed
  - id: finance-C-246
    when: When changing user-visible capabilities, CLI/API behavior, deployment, notifications, or report structure
    action: Synchronously update relevant documentation and docs/CHANGELOG.md with the change
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Undocumented API changes break existing integrations and cause confusion about expected behavior in production
      systems
  - id: finance-C-247
    when: When writing CHANGELOG.md [Unreleased] entries
    action: 'Use flat format with - [type] description per line; choose types from 新功能/改进/修复/文档/测试/chore; use [修复] only for
      bug fixes; do not add ### section headers inside [Unreleased]'
    severity: medium
    kind: architecture_guardrail
    modality: must
    consequence: Non-flat format in [Unreleased] causes merge conflicts when multiple PRs are merged concurrently, delaying
      releases
  - id: finance-C-248
    when: When modifying image_stock_extractor.py EXTRACT_PROMPT
    action: Attach the complete updated prompt in the PR description when changing EXTRACT_PROMPT in src/services/image_stock_extractor.py
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Missing prompt documentation in PR causes reviewers to miss prompt-related bugs and makes rollbacks impossible
      to verify
  - id: finance-C-249
    when: When CLAUDE.md exists in repository root
    action: Make CLAUDE.md a symbolic link pointing to AGENTS.md instead of a separate file
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Duplicate files cause rule drift where CLAUDE.md and AGENTS.md diverge, breaking AI agent collaboration expectations
  - id: finance-C-251
    when: When tempted to refactor or do infrastructure migration
    action: Perform refactoring, abstraction, or infrastructure migration that is not directly required by the current task
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Unrelated refactoring introduces bugs in stable code paths, increases testing burden, and delays the actual
      task completion
  - id: finance-C-252
    when: When tempted to execute convenient optimizations over stability
    action: Prioritize stability over convenient optimizations when making changes
    severity: high
    kind: rationalization_guard
    modality: must
    consequence: Choosing convenience over stability leads to fragile code that breaks under edge cases or future changes
  - id: finance-C-253
    when: When the codebase differs from documentation
    action: Assume documentation is correct without verifying against actual code and workflows
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Trusting documentation over code leads to implementing features based on outdated assumptions, causing runtime
      failures
  - id: finance-C-254
    when: When tempted to skip reading existing implementation before making changes
    action: Skip reading existing implementations, configurations, tests, scripts, workflows, and documentation before making
      modifications
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Skipping code review leads to duplicating existing logic, conflicting implementations, and missing understanding
      of dependencies
  - id: finance-C-255
    when: When tempted to create parallel implementations instead of reusing existing modules
    action: Create parallel implementations when existing modules, configuration entries, scripts, and tests can be reused
    severity: medium
    kind: rationalization_guard
    modality: must_not
    consequence: Parallel implementations fragment the codebase, increase maintenance burden, and create inconsistent behavior
      across similar features
  - id: finance-C-257
    when: When verifying CI failures locally
    action: Check CI failure logs with gh run view <run_id> --log-failed before rerunning each checks locally
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Immediately rerunning all checks wastes development time when CI logs already show the failure cause
  - id: finance-C-258
    when: When choosing verification methods for changes
    action: 'Select the most relevant verification based on the change scope: backend changes use ./scripts/ci_gate.sh or
      py_compile, frontend changes use npm ci && npm run lint && npm run build'
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Using wrong verification method fails to catch regressions in the actual changed code paths
  - id: finance-C-259
    when: When executing fix-issue skill
    action: Verify backend changes with ./scripts/ci_gate.sh or at minimum python -m py_compile on changed files before completion
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing backend verification allows syntax errors and import failures to reach CI, causing build failures
      and blocked merges
  - id: finance-C-260
    when: When PR has failed CI checks
    action: Review CI failure logs to diagnose the issue before attempting to fix locally or merge
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Ignoring CI failures and attempting local fixes wastes time when the issue may be environmental or already
      resolved
  - id: finance-C-261
    when: When evaluating fix-type PRs
    action: Explain original issue, root cause, fix implementation, and regression risks in fix-type PR descriptions
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing root cause analysis in fix PRs makes regression testing incomplete and future debugging harder
  - id: finance-C-262
    when: When PR review is required
    action: 'Follow the default PR review order: necessity, relevance, description completeness, validation evidence, implementation
      correctness, merge decision'
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Skipping PR review steps leads to incomplete analysis, missing important considerations, and premature or
      incorrect merge decisions
  - id: finance-C-263
    when: When preparing final delivery
    action: Include what was changed, why it was changed, verification status, unverified items, risks, and rollback method
      in the delivery
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Missing delivery elements causes reviewers to lack context, leading to longer review cycles and potential
      missed risks
  - id: finance-C-264
    when: When examining bug-related issues
    action: 'Check if the bug provides: version sync status, commit hash or version baseline, reproduction steps with environment,
      and error logs or messages'
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Bug reports without required information cannot be verified or reproduced, wasting analysis time and delaying
      fixes
  - id: finance-C-265
    when: When suspecting an issue has already been fixed
    action: Check current code directly instead of relying only on the issue description
    severity: medium
    kind: operational_lesson
    modality: must
    consequence: Assuming an issue still exists without checking current code leads to unnecessary work on already-resolved
      problems
  - id: finance-C-266
    when: When modifying AI collaboration governance assets
    action: Execute python scripts/check_ai_assets.py when modifying AGENTS.md, CLAUDE.md, .github instructions, or .claude/skills
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Skipping the AI asset check allows governance rule drift, breaking AI agent collaboration and CI checks
  - id: finance-C-267
    when: When using fix-issue skill without prior analysis
    action: Complete issue analysis first using /analyze-issue to verify the issue is valid and boundaries are clear before
      implementing fixes
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Fixing issues without prior analysis may address symptoms instead of root causes, leading to incomplete or
      incorrect solutions
  - id: finance-C-268
    when: When modifying automated tag, release, Docker publish, or desktop packaging workflows
    action: Evaluate trigger conditions, artifact paths, permission boundaries, and rollback methods when changing automated
      workflows
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Undocumented workflow changes cause unexpected releases, permission errors, or inability to roll back broken
      deployments
  - id: finance-C-269
    when: When automatic tagging is expected to trigger
    action: 'Trigger automatic version updates unless the commit title explicitly contains #patch, #minor, or #major'
    severity: medium
    kind: architecture_guardrail
    modality: must_not
    consequence: Unexpected version bumps cause release confusion, mismatched CHANGELOG entries, and inability to track actual
      changes
  - id: finance-C-270
    when: When modifying skills that exist in .claude/skills/
    action: Keep skill commands, templates, verification order, and delivery structure consistent with AGENTS.md
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Skills that diverge from AGENTS.md create conflicting expectations, causing confusion about correct procedures
  - id: finance-C-271
    when: When considering adding another agent skills directory
    action: Manually maintain multiple copies of equivalent content across different agent directories
    severity: high
    kind: rationalization_guard
    modality: must_not
    consequence: Manual maintenance of duplicate content causes rule drift as copies diverge over time, breaking AI agent
      consistency
  - id: finance-C-272
    when: When deciding to update README.md or detailed documentation
    action: Place introductory content, setup, deployment, and capability overview in README.md; place detailed module behavior,
      page interactions, configuration, and troubleshooting in docs/*.md
    severity: low
    kind: architecture_guardrail
    modality: should
    consequence: Overloading README.md with detailed documentation makes it unwieldy, while detailed docs without README links
      are hard to discover
  - id: finance-C-273
    when: When documentation changes are the only changes
    action: Write 'Docs only, tests not run' in delivery but still verify that commands, config items, file names, and workflow
      names match reality
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Skipping documentation verification allows incorrect commands or outdated references to persist, misleading
      users
  - id: finance-C-274
    when: When commit message is written
    action: Write commit messages in English without Co-Authored-By trailers
    severity: low
    kind: architecture_guardrail
    modality: must
    consequence: Non-English commit messages break tooling that expects English, while Co-Authored-By adds unnecessary metadata
  - id: finance-C-276
    when: When CI has not covered the change scope or local environment differs significantly
    action: Supplement with local verification and clearly document the verification gap and reasons
    severity: medium
    kind: operational_lesson
    modality: should
    consequence: Relying solely on CI without local verification misses environment-specific issues that may affect production
      deployments
  - id: finance-C-277
    when: When changing data_provider/
    action: Verify data source priority, fallback behavior, field standardization, caching, and timeout strategies are maintained
      correctly
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Data provider changes without fallback verification can cause silent data failures or inconsistent field
      formats downstream
  - id: finance-C-278
    when: When changing API, Schema, authentication, or report payloads
    action: Check compatibility across backend, Web, and Desktop clients; prefer appending fields, preserving old fields,
      or providing compatibility layers
    severity: high
    kind: architecture_guardrail
    modality: must
    consequence: Breaking API changes without compatibility layers cause client applications to fail or receive incorrect
      data
  - id: finance-C-279
    when: When analyzing issues involving API, data source fallback, report generation, notifications, authentication, desktop,
      or release workflows
    action: Explicitly document the impact scope when the issue involves these high-risk areas
    severity: high
    kind: operational_lesson
    modality: must
    consequence: Missing impact scope documentation causes reviewers to miss affected systems, leading to incomplete fixes
      and post-deploy issues
  - id: finance-C-280
    when: When creating or modifying manual tags
    action: Use annotated tags instead of lightweight tags for manual releases
    severity: low
    kind: operational_lesson
    modality: must
    consequence: Lightweight tags lack metadata, making it harder to track releases and verify authenticity
  - id: finance-C-281
    when: When one language version of bilingual documentation is updated
    action: Evaluate whether the other language version needs synchronization; if not, explain the reason in delivery notes
    severity: low
    kind: operational_lesson
    modality: should
    consequence: Unsynced bilingual documentation causes confusion for users relying on the secondary language version
output_validator:
  assertions:
  - id: OV-01
    check_predicate: all(p in inspect.getsource(zvt.factors.algorithm.macd) for p in ['slow=26', 'fast=12', 'n=9'])
    failure_message: 'FATAL: MACD params drifted from (fast=12, slow=26, n=9) — SL-08 violation, non-reproducible signals'
    business_meaning: Standard MACD parameters are a semantic lock; drift makes results incomparable with industry-standard
      indicators and non-reproducible.
    source_ids:
    - SL-08
    - BD-036
  - id: OV-02
    check_predicate: result.get('total_trades', 0) > 0 or result.get('explicit_zero_trade_ack') is True
    failure_message: Zero trades executed — likely missing pre-fetched data (see PC-02) or over-restrictive filters
    business_meaning: A backtest with zero trades is not a valid result; either data is missing or the strategy never triggered.
      Structural non-emptiness check is insufficient — we need business confirmation.
    source_ids:
    - SL-01
    - finance-C-073
  - id: OV-03
    check_predicate: result.get('annual_return') is None or abs(float(result['annual_return'])) <= 5.0
    failure_message: 'FATAL: |annual_return| > 500% — likely look-ahead bias or data error'
    business_meaning: Annual returns exceeding 500% are physically implausible for A-share strategies; indicates look-ahead
      bias or corrupt data.
    source_ids: []
  - id: OV-04
    check_predicate: result.get('holding_change_pct') is None or abs(float(result['holding_change_pct'])) <= 1.0
    failure_message: 'FATAL: |holding_change_pct| > 100% — physically impossible'
    business_meaning: Holding change percentage cannot exceed 100%; violation indicates position accounting error.
    source_ids:
    - BD-029
  - id: OV-05
    check_predicate: result.get('max_drawdown') is None or abs(float(result['max_drawdown'])) <= 1.0
    failure_message: 'FATAL: |max_drawdown| > 100% — impossible for non-leveraged account'
    business_meaning: Maximum drawdown cannot exceed 100% without leverage; violation indicates calculation error or look-ahead
      bias.
    source_ids: []
  - id: OV-06
    check_predicate: not (hasattr(result, 'trade_log') and result.trade_log and any(result.trade_log[i].action == 'sell' and
      i+1 < len(result.trade_log) and result.trade_log[i+1].action == 'buy' and result.trade_log[i].timestamp == result.trade_log[i+1].timestamp
      for i in range(len(result.trade_log)-1)))
    failure_message: 'FATAL: buy-before-sell detected in same cycle — SL-01 violation, creates implicit leverage'
    business_meaning: SL-01 requires sell() before buy() in each cycle; violation means available_long was not updated before
      buying, risking duplicate positions.
    source_ids:
    - SL-01
  scaffold:
    validate_py_path: '{workspace}/validate.py'
    tail_block: "# === DO NOT MODIFY BELOW THIS LINE ===\nif __name__ == \"__main__\":\n    result = run_backtest()\n    from\
      \ validate import enforce_validation\n    enforce_validation(result, output_path=\"{workspace}/result.csv\")\n# ===\
      \ END DO NOT MODIFY ==="
  enforcement_protocol: 1. Never edit validate.py. 2. Never delete the DO NOT MODIFY tail block from the main script. 3. Never
    wrap enforce_validation() in try/except. 4. Never rewrite result write logic — it MUST go through enforce_validation.
    5. If validate.py raises ImportError, fix the dependency, do not remove the call.
acceptance:
  hard_gates:
  - id: G1
    check: '{workspace}/result.csv exists AND file size > 0'
    on_fail: Strategy did not produce output; check run_backtest() return value and enforce_validation() call
  - id: G2
    check: '{workspace}/result.csv.validation_passed marker file exists'
    on_fail: Validation did not complete; review validate.py output and fix assertion failures
  - id: G3
    check: 'Main script contains literal: from validate import enforce_validation'
    on_fail: Validation chain stripped; re-add the import in the DO NOT MODIFY block
  - id: G4
    check: 'Main script contains literal: # === DO NOT MODIFY BELOW THIS LINE ==='
    on_fail: Validation fence removed; regenerate DO NOT MODIFY tail block
  - id: G5
    check: 'result.csv has at least 1 row: pandas.read_csv(result.csv).shape[0] >= 1'
    on_fail: Empty result; check if trade_log is non-empty and factors generated signals. Confirm PC-02 (k-data exists) passed.
  - id: G6
    check: 'If MACD strategy: source contains ''slow=26'' AND ''fast=12'' AND ''n=9'' in algorithm call'
    on_fail: MACD params drifted from SL-08 lock; restore standard (12, 26, 9)
  - id: G7
    check: 'For data pipeline tasks: result.csv contains ''entity_id'' and ''timestamp'' fields'
    on_fail: Missing required columns; check Mixin.query_data return schema and DataFrame MultiIndex reset_index() before
      writing
  - id: G8
    check: 'OV-03 passes: abs(annual_return) <= 5.0 (500%)'
    on_fail: Physical plausibility check failed; investigate look-ahead bias or data corruption in input kdata
  soft_gates:
  - id: SG-01
    rubric: 'Strategy narrative consistency: user intent aligns with generated strategy.py logic. dim_a: signal direction
      (buy/sell) matches intent [1-5, pass>=4]; dim_b: frequency (daily/intraday) aligns [1-5, pass>=4]; dim_c: risk controls
      match user intent [1-5, pass>=4].'
  - id: SG-02
    rubric: 'Factor combination quality. dim_a: no highly correlated factor duplication [1-5, pass>=4]; dim_b: multi-period
      alignment correct [1-5, pass>=4]; dim_c: liquidity filter present for A-share [1-5, pass>=4].'
  - id: SG-03
    rubric: 'Data source selection appropriateness. dim_a: coverage sufficient for target entities [1-5, pass>=4]; dim_b:
      provider latency acceptable for strategy frequency [1-5, pass>=4]; dim_c: no unauthorized provider used without credentials
      [1-5, pass>=4].'
skill_crystallization:
  trigger: all_hard_gates_passed AND user_opt_out_skill_saving != true
  output_path_template: '{workspace}/../skills/{slug}.skill'
  slug_template: '{blueprint_id_short}-{uc_id_lower}'
  captured_fields:
  - name
  - intent_keywords
  - entry_point_script
