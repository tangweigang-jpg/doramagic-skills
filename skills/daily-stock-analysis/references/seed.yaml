    derived_from_bd_id: BD-079
  - id: finance-C-200
    when: When implementing volume anomaly detection using shift(1) alignment and fixed thresholds
    action: Account for the one-day detection lag inherent in shift(1) combined with 0.7/1.5 volume thresholds — during rapidly
