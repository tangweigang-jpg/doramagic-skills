    severity: high
    kind: operational_lesson
    modality: must
    consequence: 'The interaction between shift(1) and fixed thresholds creates systematic delayed detection: optimal entry
      timing is missed because volume anomaly is confirmed after price has already moved, reducing strategy alpha in fast-moving
      markets'
    derived_from_bd_id: BD-092
  - id: finance-C-201
    when: When implementing Tushare API data fetching in batch operations
    action: Implement random sleep jitter between API calls using the configured SLEEP_MIN to SLEEP_MAX range — do not remove
      jitter or use fixed delays
    severity: high
    kind: architecture_guardrail
    modality: must
