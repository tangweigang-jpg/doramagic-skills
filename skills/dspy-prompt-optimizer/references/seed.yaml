    name: Privacy-Conscious Delegation (PAPILLON)
    positive_terms:
    - privacy
    - PAPILLON
    - delegation
    - PII redaction
    data_domain: mixed
    negative_terms:
    - plain RAG
    ambiguity_question: PAPILLON = local-LM redact + remote-LM answer; standard RAG = remote retrieve + answer.
